<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Ready4Drive — Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .login-wrap {
      flex: 1; display: flex; flex-direction: column;
      padding: var(--space-lg) var(--space-md);
      max-width: 430px; margin: 0 auto; width: 100%;
    }
    .login-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-secondary); font-size: 14px; font-weight: 600;
      margin-bottom: var(--space-xl);
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 22px; font-weight: 800;
      margin-bottom: 32px;
    }
    .login-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .login-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }
    .phone-prefix {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 15px; font-weight: 600; color: var(--text-secondary);
    }
    .phone-input { padding-left: 40px !important; }
    .forgot-link {
      font-size: 13px; font-weight: 600; color: var(--brand-primary);
      text-align: right; display: block; margin-top: 8px;
    }
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--text-muted); font-size: 13px;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .signup-prompt {
      text-align: center; font-size: 14px; color: var(--text-secondary);
      margin-top: 24px;
    }
    .signup-link { color: var(--brand-primary); font-weight: 700; }
    .trust-row {
      display: flex; justify-content: center; gap: 20px;
      margin-top: auto; padding-top: 32px;
    }
    .trust-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .input-wrapper { position: relative; }

    .error-msg {
      display: none; background: rgba(255,59,59,0.10);
      border: 1px solid rgba(255,59,59,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; font-weight: 700;
      color: var(--danger); margin-bottom: 4px;
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .input-field.error {
      border-color: var(--danger) !important;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a href="index.html" class="login-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </a>

    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#00C27C"/>
        <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Ready4Drive
    </div>

    <h1 class="login-title">Bienvenido de vuelta 👋</h1>
    <p class="login-sub">Ingresa con tu número de teléfono para continuar.</p>

    <div style="display:flex; flex-direction:column; gap: 16px;">
      <div class="input-group">
        <label class="input-label">Número de teléfono</label>
        <div class="input-wrapper">
          <span class="phone-prefix">+1</span>
          <input type="tel" class="input-field phone-input" id="phoneInput" placeholder="(754) 232-6272" inputmode="numeric">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" class="input-field" placeholder="••••••••" id="pwInput">
          <button onclick="togglePw()" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); color: var(--text-muted);" tabindex="-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <div id="loginError" class="error-msg">Número o contraseña incorrectos. Intenta de nuevo.</div>
      <button class="btn btn-primary" style="font-size:16px; padding:16px; margin-top:8px;" onclick="doLogin()">
        Iniciar sesión →
      </button>
    </div>

    <div class="login-divider">o continúa con</div>

    <a href="https://wa.me/19547010640" class="btn btn-ghost" style="gap:8px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Soporte por WhatsApp
    </a>

    <p class="signup-prompt">
      ¿No tienes cuenta? <a href="#" class="signup-link">Regístrate gratis</a>
    </p>

    <div class="trust-row">
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00C27C" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        100% Seguro
      </div>
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00C27C" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        4.9/5 estrellas
      </div>
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00C27C" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Soporte 24/7
      </div>
    </div>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('pwInput');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    function doLogin() {
      const phone = document.getElementById('phoneInput').value.replace(/\D/g,'');
      const pw    = document.getElementById('pwInput').value;
      const err   = document.getElementById('loginError');
      const pInp  = document.getElementById('phoneInput');
      const pwInp = document.getElementById('pwInput');

      // Reset
      err.classList.remove('show');
      pInp.classList.remove('error');
      pwInp.classList.remove('error');

      if (!phone || phone.length < 7 || !pw || pw.length < 4) {
        err.textContent = 'Por favor ingresa tu número y contraseña.';
        err.classList.add('show');
        if (!phone || phone.length < 7) pInp.classList.add('error');
        if (!pw || pw.length < 4) pwInp.classList.add('error');
        return;
      }

      // Simular autenticación — en producción esto sería una llamada al backend
      // Credenciales demo: 7542326272 / Clave123.
      const validPhone = phone === '7542326272';
      const validPw    = pw === 'Clave123.';

      if (validPhone && validPw) {
        window.location.href = 'dashboard.html';
      } else {
        err.textContent = 'Número o contraseña incorrectos. Intenta de nuevo.';
        err.classList.add('show');
        pInp.classList.add('error');
        pwInp.classList.add('error');
        // Limpiar error después de 4s
        setTimeout(() => {
          err.classList.remove('show');
          pInp.classList.remove('error');
          pwInp.classList.remove('error');
        }, 4000);
      }
    }
  </script>
</body>
</html>
